<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Veille</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon.png" />
<meta name="theme-color" content="#E7E3DA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<script>
window.onerror = function(msg, src, line){
  var b = document.getElementById('errbar');
  if(b){ b.style.display = 'block'; b.textContent = 'Error: ' + msg + ' (line ' + line + ')'; }
  return false;
};
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&display=swap');
:root{
  --paper:#E7E3DA; --card:#F8F6F1; --ink:#16130F; --muted:#8B8578;
  --line:#D6D0C2; --blue:#2036E8; --bluesoft:#E4E7FD;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:system-ui,sans-serif;min-height:100vh}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

#errbar{display:none;background:#C03A2B;color:#fff;font-family:ui-monospace,Menlo,monospace;font-size:11px;padding:8px 12px}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;max-width:560px;margin:0 auto}
.wordmark{font-family:'Archivo',system-ui,sans-serif;font-weight:900;font-size:18px;letter-spacing:.22em;font-stretch:125%}
.hbtns{display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:6px;border-radius:999px;padding:7px 13px;font-family:ui-monospace,Menlo,monospace;font-size:11px}
#scanBtn{background:var(--ink);color:var(--paper)}
#scanBtn.busy{background:var(--bluesoft);color:var(--blue)}
#savedBtn{border:1px solid var(--ink)}
#savedBtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

#deckView{max-width:560px;margin:0 auto;padding:4px 16px 160px}
#deckWrap{position:relative;height:calc(100vh - 355px);height:calc(100dvh - 355px);min-height:245px;max-height:640px}
.card{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--card);border:1px solid var(--ink);border-radius:10px;
  display:flex;flex-direction:column;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none}
.card.top{box-shadow:4px 4px 0 rgba(22,19,15,.9);cursor:grab;z-index:2}
.card.under{transform:scale(.955) translateY(12px);box-shadow:2px 2px 0 rgba(22,19,15,.35);z-index:1}
.card .meta{display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line);
  font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.card .img{flex:1;min-height:0;background:#DDD8CC}
.card .img img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
.card .img{position:relative}
.playBtn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:66px;height:66px;border-radius:50%;
  background:var(--blue);color:#fff;border:1px solid var(--ink);box-shadow:3px 3px 0 rgba(22,19,15,.6);
  font-size:24px;padding-left:5px;display:flex;align-items:center;justify-content:center;z-index:6}
.playBtn:active{transform:translate(-50%,-50%) scale(.94)}
.card .bigtitle{flex:1;display:flex;align-items:center;padding:8px 18px;font-family:'Archivo',system-ui,sans-serif;font-weight:800;line-height:1.08}
.card .foot{padding:12px 14px 14px;border-top:1px solid var(--line)}
.card .t{font-family:'Archivo',system-ui,sans-serif;font-weight:700;font-size:16px;line-height:1.15}
.card .n{font-size:13px;line-height:1.45;color:#4A463E;margin-top:6px}
.card .open{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-family:ui-monospace,Menlo,monospace;
  font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:.06em}
.stamp{position:absolute;top:22px;border:3px solid;padding:4px 10px;font-family:'Archivo',system-ui,sans-serif;font-weight:900;
  font-size:20px;letter-spacing:.18em;opacity:0;pointer-events:none;z-index:5;background:rgba(248,246,241,.7)}
.stamp.keep{left:18px;color:var(--blue);border-color:var(--blue);transform:rotate(-10deg)}
.stamp.pass{right:18px;color:var(--muted);border-color:var(--muted);transform:rotate(10deg)}

.emptyDeck{position:absolute;top:0;left:0;right:0;bottom:0;border:1px dashed var(--muted);border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;font-size:12px;text-align:center;padding:20px}
.refillBtn{border:1px solid var(--ink);background:var(--card);border-radius:999px;padding:8px 16px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink)}

#laneBar{position:fixed;left:0;right:0;margin:0 auto;max-width:560px;bottom:calc(76px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);gap:16px 10px;padding:12px 16px 6px;z-index:20}
#laneBar::-webkit-scrollbar{display:none}
.laneChip{position:relative;width:100%;height:52px;
  border:1px solid var(--ink);border-radius:0 7px 5px 5px;background:var(--card);
  box-shadow:2px 2px 0 rgba(22,19,15,.5);
  display:flex;align-items:flex-end;justify-content:center;padding:5px 3px;
  font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.02em;color:var(--ink);
  text-align:center;line-height:1.15;transition:transform .12s ease, background .12s ease}
.laneChip::before{content:"";position:absolute;top:-8px;left:-1px;width:46%;height:9px;
  background:var(--card);border:1px solid var(--ink);border-bottom:none;border-radius:5px 7px 0 0;
  transition:background .12s ease}
.laneChip::after{content:"";position:absolute;top:1px;left:3px;right:3px;height:1px;background:var(--line)}
.laneChip:active,.laneChip.hot{background:var(--blue);color:#fff;border-color:var(--blue);transform:translateY(-4px);box-shadow:3px 5px 0 rgba(22,19,15,.55)}
.laneChip:active::before,.laneChip.hot::before{background:var(--blue);border-color:var(--blue)}
.laneChip:active::after,.laneChip.hot::after{background:rgba(255,255,255,.35)}
#controls{position:fixed;left:0;right:0;bottom:calc(24px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:26px;z-index:20;pointer-events:none}
#controls button{pointer-events:auto}
.round{border-radius:50%;display:flex;align-items:center;justify-content:center}
#undoBtn{width:40px;height:40px;border:1px solid var(--muted);font-size:15px}
#undoBtn:disabled{border-color:var(--line);color:var(--line);cursor:default}
#status{position:fixed;left:0;right:0;bottom:calc(8px + env(safe-area-inset-bottom));font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted);text-align:center;min-height:14px;z-index:20}

#savedView{max-width:560px;margin:0 auto;padding:4px 16px 40px;display:none}
.laneGroup{margin-bottom:22px}
.laneHead{font-family:'Archivo',system-ui,sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.14em;
  border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.laneActs{display:flex;align-items:center;gap:8px;flex-shrink:0}
.laneCount{color:var(--muted);min-width:16px;text-align:right}
.clearBtn{border:1px solid var(--muted);color:var(--muted);border-radius:999px;padding:4px 10px;font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:none;letter-spacing:0}
.pushBtn:disabled{border-color:var(--line);color:var(--muted);opacity:.7}
.laneHead span:last-child{color:var(--muted)}
.saveRow{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.saveRow .thumb{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex-shrink:0}
.saveRow .thumbTxt{width:44px;height:44px;border-radius:6px;background:var(--bluesoft);color:var(--blue);
  display:flex;align-items:center;justify-content:center;font-family:'Archivo',system-ui,sans-serif;font-weight:900;font-size:16px;flex-shrink:0}
.saveRow .info{flex:1;min-width:0}
.saveRow .st{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saveRow .ss{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted)}
.saveRow select{font-family:ui-monospace,Menlo,monospace;font-size:10px;border:1px solid var(--line);border-radius:6px;
  background:var(--card);padding:4px 2px;max-width:92px;color:var(--ink)}
.saveRow .ico{padding:4px;font-size:15px}
.emptySaved{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted);text-align:center;padding-top:60px}

#srcBtn{border:1px solid var(--ink)}
#srcBtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
#sourcesView{max-width:560px;margin:0 auto;padding:4px 16px 40px;display:none}
.srcNote{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.addBox{border:1px dashed var(--muted);border-radius:10px;padding:12px;margin-bottom:22px}
.addBox input,.addBox select{font-family:ui-monospace,Menlo,monospace;font-size:12px;border:1px solid var(--line);border-radius:6px;background:var(--card);padding:9px;color:var(--ink);width:100%;margin-bottom:8px;box-sizing:border-box}
.addBtn{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 16px;font-family:ui-monospace,Menlo,monospace;font-size:11px}
#srcMsg{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--blue);min-height:14px;margin-top:6px}
.srcRow{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.srcRow .info{flex:1;min-width:0}
.srcRow .st{font-size:13px;font-weight:600}
.srcRow .ss{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted)}
.pushBtn{border:1px solid var(--blue);color:var(--blue);background:var(--card);border-radius:999px;padding:4px 10px;font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:none;letter-spacing:0}
.tog{border:1px solid var(--ink);border-radius:999px;padding:5px 13px;font-family:ui-monospace,Menlo,monospace;font-size:10px}
.tog.on{background:var(--blue);border-color:var(--blue);color:#fff}
#toast{position:fixed;left:12px;right:12px;bottom:calc(228px + env(safe-area-inset-bottom));background:var(--ink);color:var(--paper);border-radius:12px;
  padding:10px 12px;display:none;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:0 6px 24px rgba(0,0,0,.35);z-index:50}
#toast .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#B7B1A4}
#toast .chip{border:1px solid #4A463E;border-radius:999px;padding:5px 10px;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--paper)}
#toast .chip.hot{background:var(--blue);border-color:var(--blue);color:#fff}
#toast .close{margin-left:auto;color:#B7B1A4;padding:4px}
</style>
</head>
<body>

<div id="errbar"></div>

<header>
  <div class="wordmark">LA VEILLE</div>
  <div class="hbtns">
    <button id="scanBtn" class="pill">&#9673; scan</button>
    <button id="savedBtn" class="pill">&#9636; <span id="savedCount">0</span></button>
    <button id="srcBtn" class="pill">&#9881;</button>
  </div>
</header>

<div id="deckView">
  <div id="deckWrap">
    <div class="emptyDeck">chargement&hellip;</div>
  </div>
  <div id="laneBar"></div>
  <div id="controls">
    <button id="undoBtn" class="round" aria-label="Undo" disabled>&#8634;</button>
  </div>
  <div id="status"></div>
</div>

<div id="savedView"></div>
<div id="sourcesView"></div>
<div id="toast"></div>

<script>
/* ---- data ---- */
var LANES = [
  { id:"inbox", label:"Inbox", terms:[] },
  { id:"felt-not-seen", label:"Felt, not seen", terms:["luxury editorial","perfume","jewelry photography","beauty campaign"] },
  { id:"constructed-wanting", label:"Constructed wanting", terms:["desire","advertising archive","consumerism","shopping"] },
  { id:"letterforms", label:"Letterforms", terms:["type specimen","typography","lettering","typeface"] },
  { id:"proof-of-hand", label:"Proof of hand", terms:["risograph","printmaking","collage","hand painted sign"] },
  { id:"symbiotic-design", label:"Symbiotic design", terms:["generative design","ai aesthetics","machine art"] },
  { id:"not-design", label:"Left field", terms:[] },
  { id:"mass-culture", label:"Mass culture", terms:[] },
  { id:"the-herd", label:"The herd", terms:["rebrand","brand identity","visual identity"] }
];
function laneById(id){ for(var i=0;i<LANES.length;i++){ if(LANES[i].id===id) return LANES[i]; } return LANES[0]; }
var STORE_KEY = "laveille-state-v1";

var STARTERS = [
  { id:"st-velvetyne", lane:"letterforms", title:"Velvetyne", source:"velvetyne.fr", url:"https://velvetyne.fr", note:"French open-source foundry. Type as provocation, free to break." },
  { id:"st-dinamo", lane:"letterforms", title:"ABC Dinamo", source:"abcdinamo.com", url:"https://abcdinamo.com", note:"Basel foundry setting the tone everyone copies two years later." },
  { id:"st-production", lane:"letterforms", title:"Production Type", source:"productiontype.com", url:"https://www.productiontype.com", note:"Paris rigor. Your lane." },
  { id:"st-klim", lane:"letterforms", title:"Klim Type Foundry", source:"klim.co.nz", url:"https://klim.co.nz", note:"Sowersby's essays alone are worth the follow." },
  { id:"st-illstudio", lane:"felt-not-seen", title:"Ill-Studio", source:"ill-studio.com", url:"https://ill-studio.com", note:"Paris. Luxury times culture, without asking permission." },
  { id:"st-jjjjound", lane:"felt-not-seen", title:"JJJJound", source:"jjjjound.com", url:"https://www.jjjjound.com", note:"Curation as luxury object. The reference standard." },
  { id:"st-032c", lane:"constructed-wanting", title:"032c", source:"032c.com", url:"https://032c.com", note:"Berlin. Desire, theory and fashion in one magazine." },
  { id:"st-tbi", lane:"the-herd", title:"The Brand Identity", source:"thebrandidentity.com", url:"https://the-brandidentity.com", note:"Where identity work gets canonized. Watch it, then swerve." },
  { id:"st-hover", lane:"proof-of-hand", title:"Hoverstates", source:"hoverstat.es", url:"https://www.hoverstat.es", note:"The handmade edge of the web, one site at a time." },
  { id:"st-fiu", lane:"letterforms", title:"Fonts In Use", source:"fontsinuse.com", url:"https://fontsinuse.com", note:"Type in the wild. Evidence, not opinions." },
  { id:"st-int", lane:"the-herd", title:"It's Nice That", source:"itsnicethat.com", url:"https://www.itsnicethat.com", note:"The mainstream of the interesting. Calibration, not discovery." },
  { id:"st-modem", lane:"symbiotic-design", title:"Modem", source:"modemworks.com", url:"https://modemworks.com", note:"Amsterdam. Designing what AI should feel like, not just look like." },
  { id:"st-sougwen", lane:"symbiotic-design", title:"Sougwen Chung", source:"sougwen.com", url:"https://sougwen.com", note:"Drawing with machines for a decade. Symbiosis, literally." },
  { id:"st-arena", lane:"not-design", title:"Are.na", source:"are.na", url:"https://www.are.na", note:"Your new archive. The anti-algorithm." }
];
function seedStarters(){
  var fresh = STARTERS.filter(function(c){ return !state.seen[c.id]; });
  queue = queue.concat(shuffle(fresh));
}

var state = { saves:[], seen:{}, laneScores:{}, srcScores:{}, skipped:0, disabled:{}, custom:[], chScores:{}, discovered:{}, laneChannels:{} };
var queue = [{ id:"hint", kind:"hint", lane:"inbox", source:"la veille",
  title:"Swipe right to keep. Swipe left to pass.",
  note:"Kept things land in your Inbox - a toast lets you file them into a lane with one tap. Every swipe teaches the deck your taste. Try it on this card." }];
var view = "deck", loading = false, scanning = false, errMsg = null;
var failCount = 0, lastSkip = null, toastSave = null, toastTimer = null, persistTimer = null;
var memoryOnly = false;

/* ---- helpers ---- */
function $(id){ return document.getElementById(id); }
function domainOf(u){ try { return new URL(u).hostname.replace("www.",""); } catch(e) { return ""; } }
function shuffle(a){ var b=a.slice(); for(var i=b.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=b[i]; b[i]=b[j]; b[j]=t; } return b; }
function bump(o,k,d){ o[k] = (o[k]||0) + d; }

function load(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(raw){ var parsed = JSON.parse(raw); for(var k in parsed) state[k] = parsed[k]; }
  }catch(e){ memoryOnly = true; }
  return Promise.resolve();
}
function persist(){
  if(memoryOnly) return;
  clearTimeout(persistTimer);
  persistTimer = setTimeout(function(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    catch(e){ console.error("persist", e); }
  }, 400);
}

/* ---- supply: are.na (default channels + user-managed sources) ---- */
var DEFAULT_CHANNELS = [
  { slug:"beauty", lane:"felt-not-seen", len:406, title:"Beauty" },
  { slug:"still-life", lane:"felt-not-seen", len:59, title:"Still Life" },
  { slug:"cosmetics", lane:"felt-not-seen", len:35, title:"Cosmetics" },
  { slug:"commercials", lane:"constructed-wanting", len:20, title:"Commercials" },
  { slug:"capitalism", lane:"constructed-wanting", len:20, title:"Capitalism" },
  { slug:"typography-2", lane:"letterforms", len:205, title:"Typography 2" },
  { slug:"type-in-use", lane:"letterforms", len:80, title:"Type / In Use" },
  { slug:"type-specimens", lane:"letterforms", len:27, title:"Type Specimens" },
  { slug:"hands", lane:"proof-of-hand", len:142, title:"hands" },
  { slug:"letterings", lane:"proof-of-hand", len:39, title:"Letterings" },
  { slug:"machine-made", lane:"symbiotic-design", len:31, title:"machine made" },
  { slug:"synthetic-images", lane:"symbiotic-design", len:12, title:"Synthetic Images" },
  { slug:"random-references", lane:"not-design", len:727, title:"Random References" },
  { slug:"desire-paths", lane:"not-design", len:156, title:"desire paths" },
  { slug:"color", lane:"not-design", len:67, title:"Color" },
  { slug:"architecture", lane:"not-design", len:22, title:"Architecture" },
  { slug:"television", lane:"mass-culture", len:29, title:"Television" },
  { slug:"internet-culture", lane:"mass-culture", len:26, title:"Internet Culture" },
  { slug:"mtv", lane:"mass-culture", len:22, title:"MTV" },
  { slug:"desain-grafis", lane:"the-herd", len:3850, title:"desain grafis" },
  { slug:"posters", lane:"the-herd", len:666, title:"Posters" },
  { slug:"publishing-scwj4fjjzlw", lane:"the-herd", len:326, title:"Publishing" },
  { slug:"editorial-design", lane:"the-herd", len:131, title:"Editorial Design" }
];
function activeChannels(){
  var all = DEFAULT_CHANNELS.concat(state.custom || []);
  return all.filter(function(c){ return !state.disabled[c.slug]; });
}
function weightedChannelPick(n){
  var pool = activeChannels();
  var picks = [];
  for(var i=0;i<n && pool.length;i++){
    var w = pool.map(function(c){ var chF = Math.max(0.15, 1 + ((state.chScores||{})[c.slug]||0)/8); return Math.max(1, 3 + (state.laneScores[c.lane]||0)) * Math.min(3, 1 + c.len/100) * chF; });
    var total = w.reduce(function(a,b){ return a+b; }, 0);
    var r = Math.random()*total;
    for(var j=0;j<pool.length;j++){
      r -= w[j];
      if(r<=0){ picks.push(pool[j]); pool.splice(j,1); break; }
    }
  }
  return picks;
}
function cleanTitle(t, chTitle){
  t = String(t||"").trim();
  if(!t) return "From \u201C"+chTitle+"\u201D";
  if(t.indexOf(" ")===-1 && /^[A-Za-z0-9_.-]{16,}$/.test(t)) return "From \u201C"+chTitle+"\u201D";
  return t;
}
function mapBlocks(cs, ch){
  return (cs||[])
    .filter(function(b){ return b && b["class"]!=="Channel" && !state.seen["a"+b.id]; })
    .map(function(b){
      var img = null;
      if(b.image){ img = (b.image.display && b.image.display.url) || (b.image.thumb && b.image.thumb.url) || null; }
      return {
        id:"a"+b.id, kind:"arena", lane:ch.lane, ch:ch.slug,
        title: cleanTitle(b.title || b.generated_title, ch.title),
        image: img,
        url: (b.source && b.source.url) || ("https://www.are.na/block/"+b.id),
        source: (b.source && b.source.url) ? domainOf(b.source.url) : ("are.na \u00B7 "+ch.title.toLowerCase()),
        note: b["class"]==="Text" ? String(b.content||"").slice(0,180) : null
      };
    })
    .filter(function(c){ return c.image || c.note; });
}
function fetchChannel(ch){
  var pages = Math.max(1, Math.ceil(ch.len/24));
  var page = 1 + Math.floor(Math.random()*pages);
  var base = "https://api.are.na/v2/channels/"+ch.slug+"/contents?per=24&page=";
  return fetch(base+page)
    .then(function(res){ if(!res.ok) throw new Error("are.na "+res.status); return res.json(); })
    .then(function(data){
      var cs = data.contents || [];
      if(cs.length || page === 1) return mapBlocks(cs, ch);
      return fetch(base+"1")
        .then(function(res){ if(!res.ok) throw new Error("are.na "+res.status); return res.json(); })
        .then(function(d2){ return mapBlocks(d2.contents, ch); });
    });
}
function refill(manual){
  if(loading) return;
  if(!activeChannels().length){ errMsg = "No sources enabled - open \u2699 and switch some on."; renderStatus(); return; }
  if(!manual && failCount >= 2) return;
  loading = true; errMsg = null; renderStatus(); renderDeck();
  var picks = weightedChannelPick(3);
  var jobs = picks.map(function(ch){
    return fetchChannel(ch)["catch"](function(){ return []; });
  });
  Promise.all(jobs).then(function(results){
    var fresh = shuffle([].concat.apply([], results));
    var have = {};
    queue.forEach(function(c){ have[c.id]=1; });
    fresh = fresh.filter(function(c){ return !have[c.id]; });
    var head = queue.slice(0,1);
    var rest = shuffle(queue.slice(1).concat(fresh));
    queue = head.concat(rest).slice(0,40);
    if(fresh.length){ failCount = 0; }
    else { failCount++; errMsg = "Nothing new from Are.na - refill again for fresh channels."; }
  })["catch"](function(){
    failCount++; errMsg = "Are.na unreachable - refill to retry.";
  }).then(function(){
    loading = false; renderDeck(); renderStatus();
  });
}

/* ---- supply: claude scan (needs your own Anthropic API key) ---- */
function getKey(){

    if(k){ k = k.trim(); try{ localStorage.setItem("laveille-key", k); }catch(e){} }
  }
  return k;
}
function scan(){
  if(scanning) return;

  var topLanes = Object.keys(state.laneScores).sort(function(a,b){ return state.laneScores[b]-state.laneScores[a]; }).slice(0,3).map(function(k){ return laneById(k).label; });
  var srcKeys = Object.keys(state.srcScores).sort(function(a,b){ return state.srcScores[b]-state.srcScores[a]; }).slice(0,4);
  var recent = state.saves.slice(-5).map(function(v){ return v.title; });
  var prompt = 'You are the radar for a creative director in luxury/beauty branding who hunts avant-garde, up-and-coming work. Use web search to find 6 very recent items (new typeface releases from independent foundries like Velvetyne, Dinamo, Production Type, Blaze Type, fonts.xyz; new projects from studios like Ill-Studio, Mouthwash, Modem, Oio, Actual Source; fresh posts from The Brand Identity, Its Nice That, 032c, Do Not Research). '
    + (topLanes.length ? "Their taste leans toward: "+topLanes.join(", ")+". " : "")
    + (srcKeys.length ? "Sources they keep: "+srcKeys.join(", ")+". " : "")
    + (recent.length ? "Recently kept: "+recent.join(" / ")+". " : "")
    + 'Respond ONLY with a raw JSON array, no markdown, no preamble. Each item: {"title": string, "url": string, "source": string, "note": string (max 14 words, sharp and opinionated), "lane": one of "felt-not-seen"|"constructed-wanting"|"letterforms"|"proof-of-hand"|"symbiotic-design"|"not-design"|"the-herd"}';
  fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-6", max_tokens:1000,
      messages:[{role:"user",content:prompt}],
      tools:[{type:"web_search_20250305", name:"web_search"}]
    })
  }).then(function(res){
    if(res.status === 401 || res.status === 403){
      try{ localStorage.removeItem("laveille-key"); }catch(e){}
      throw new Error("key rejected");
    }
    return res.json();
  })
  .then(function(data){
    var text = (data.content||[]).filter(function(b){ return b.type==="text"; }).map(function(b){ return b.text; }).join("\n");
    var raw = text.replace(/```json|```/g,"");
    var items = JSON.parse(raw.slice(raw.indexOf("["), raw.lastIndexOf("]")+1));
    var known = {};
    LANES.forEach(function(l){ known[l.id]=1; });
    var cards = items.filter(function(it){ return it && it.title && it.url; })
      .map(function(it,i){

    if(!cards.length) errMsg = "Scan came back empty - try again.";
    failCount = 0;
  }).catch(function(e){

/* ---- swipe ---- */
var drag = null;
function attachSwipe(el){
  el.addEventListener("pointerdown", function(e){
    if(e.target.closest(".open")) return;
    var chips = [];
    document.querySelectorAll(".laneChip").forEach(function(b){ chips.push({ el:b, lane:b._lane }); });
    drag = { sx:e.clientX, sy:e.clientY, x:0, y:0, chips:chips, hover:null };
    if(el.setPointerCapture) el.setPointerCapture(e.pointerId);
    el.style.transition = "none";
  });
  el.addEventListener("pointermove", function(e){
    if(!drag) return;
    drag.x = e.clientX - drag.sx; drag.y = e.clientY - drag.sy;
    el.style.transform = "translate("+drag.x+"px,"+(drag.y*0.4)+"px) rotate("+(drag.x/22)+"deg)";
    var k = el.querySelector(".stamp.keep"), p = el.querySelector(".stamp.pass");
    if(k) k.style.opacity = Math.min(1, Math.max(0, drag.x/80));
    if(p) p.style.opacity = Math.min(1, Math.max(0, -drag.x/80));
    var hover = null;
    for(var ci = 0; ci < drag.chips.length; ci++){
      var rc = drag.chips[ci].el.getBoundingClientRect();
      if(e.clientX >= rc.left && e.clientX <= rc.right && e.clientY >= rc.top && e.clientY <= rc.bottom){ hover = drag.chips[ci]; break; }
    }
    var prev = drag.hover ? drag.hover.el : null, cur = hover ? hover.el : null;
    if(prev !== cur){
      if(prev) prev.classList.remove("hot");
      if(cur) cur.classList.add("hot");
      drag.hover = hover;
    }
  });
  function end(){
    if(!drag) return;
    var x = drag.x, hover = drag.hover; drag = null;
    if(hover){ hover.el.classList.remove("hot"); commit(1, el, hover.lane); return; }
    if(x > 90) commit(1, el);
    else if(x < -90) commit(-1, el);
    else { el.style.transition = "transform .24s ease"; el.style.transform = ""; }
  }
  el.addEventListener("pointerup", end);
  el.addEventListener("pointercancel", end);
}
function commit(dir, el, fileLane){
  var card = queue[0];
  if(!card) return;
  var target = el || document.querySelector(".card.top");
  if(target){
    target.style.transition = "transform .24s ease";
    target.style.transform = "translate("+(dir*window.innerWidth*1.2)+"px,-20px) rotate("+(dir*18)+"deg)";
  }
  setTimeout(function(){
    queue = queue.slice(1);
    if(card.kind !== "hint"){
      state.seen[card.id] = 1;
      if(dir > 0){
        var save = {};
        for(var k in card) save[k] = card[k];
        save.lane = fileLane || "inbox"; save.savedAt = Date.now();
        state.saves.push(save);
        bump(state.laneScores, card.lane, 2);
        bump(state.srcScores, card.source, 2);
        if(card.ch) bump(state.chScores, card.ch, 2);
        discoverFrom(card);
        if(fileLane){ bump(state.laneScores, fileLane, 1); }
        else showToast(save, card.lane);
      } else {
        lastSkip = card;
        state.skipped++;
        bump(state.laneScores, card.lane, -1);
        bump(state.srcScores, card.source, -1);
        if(card.ch) bump(state.chScores, card.ch, -1);
      }
      persist();
    }
    renderAll();
    if(queue.length < 4 && !loading) refill(false);
  }, 240);
}
function undo(){
  if(!lastSkip) return;
  delete state.seen[lastSkip.id];
  state.skipped = Math.max(0, state.skipped-1);
  bump(state.laneScores, lastSkip.lane, 1);
  queue = [lastSkip].concat(queue);
  lastSkip = null;
  persist(); renderAll();
}

function videoEmbed(url){
  if(!url) return null;
  var yt = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  if(yt) return "https://www.youtube.com/embed/"+yt[1]+"?autoplay=1&playsinline=1&rel=0";
  var vm = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);

  return null;
}

/* ---- taste graph: learn which channels hold what you keep ---- */
function discoverFrom(card){
  if(card.kind !== "arena" || !/^a\d+$/.test(card.id)) return;
  fetch("https://api.are.na/v2/blocks/"+card.id.slice(1)+"/channels?per=10")
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(d){
      if(!d) return;
      var known = {};
      DEFAULT_CHANNELS.concat(state.custom||[]).forEach(function(c){ known[c.slug]=1; });
      (d.channels||[]).forEach(function(c){
        if(c.status !== "public" || (c.length||0) < 30 || known[c.slug]) return;
        if(!state.discovered) state.discovered = {};
        var e = state.discovered[c.slug];
        if(e){ e.hits++; e.len = c.length||e.len; }
        else state.discovered[c.slug] = { title:c.title||c.slug, len:c.length||0, hits:1, lane:card.lane };
      });
      persist();
    })["catch"](function(){});
}

/* ---- push saves into the user's own are.na channels ---- */
function arenaToken(){ try{ return localStorage.getItem("laveille-arena-token") || ""; }catch(e){ return ""; } }
function pushItem(slug, v, token){
  var headers = { "Content-Type":"application/json", "Authorization":"Bearer "+token };
  var isArenaBlock = /^a\d+$/.test(v.id||"");
  var p;
  if(isArenaBlock){
    p = fetch("https://api.are.na/v2/channels/"+slug+"/connections", {
      method:"POST", headers:headers,
      body: JSON.stringify({ connectable_type:"Block", connectable_id: parseInt(v.id.slice(1),10) })
    }).then(function(r){ if(!r.ok) throw new Error("conn "+r.status); });
  } else {
    p = Promise.reject(new Error("skip"));
  }
  return p["catch"](function(){
    return fetch("https://api.are.na/v2/channels/"+slug+"/blocks", {
      method:"POST", headers:headers,
      body: JSON.stringify({ source: v.url })
    }).then(function(r){ if(!r.ok) throw new Error("push "+r.status); });
  }).then(function(){ v.pushed = true; });
}
function pushLane(laneId, done){
  var token = arenaToken();
  var slug = (state.laneChannels||{})[laneId];
  if(!token || !slug){ if(done) done(0,0); return; }
  var items = state.saves.filter(function(v){ return v.lane===laneId && !v.pushed; });
  var i = 0, ok = 0, fail = 0;
  function next(){
    if(i >= items.length){ persist(); renderSaved(); if(done) done(ok, fail); return; }
    var v = items[i++];
    pushItem(slug, v, token).then(function(){ ok++; next(); })["catch"](function(){ fail++; next(); });
  }
  next();
}

/* ---- sources view ---- */
function purgeChannelFromDeck(slug){
  queue = queue.filter(function(c){ return c.kind!=="arena" || c.ch!==slug; });
}
function toggleSource(slug){
  if(state.disabled[slug]){ delete state.disabled[slug]; failCount = 0; }
  else { state.disabled[slug] = 1; purgeChannelFromDeck(slug); }
  persist(); renderSources(); renderDeck(); renderStatus();
}
function removeCustom(slug){
  state.custom = (state.custom||[]).filter(function(c){ return c.slug!==slug; });
  delete state.disabled[slug];

  persist(); renderSources(); renderDeck();
}
function srcMsg(t){ var m = $("srcMsg"); if(m) m.textContent = t || ""; }
function addCustomChannel(){
  var inp = $("srcInput"), sel = $("srcLane");

    .then(function(r){ if(!r.ok) throw new Error("nf"); return r.json(); })
    .then(function(d){
      if(typeof d.length !== "number") throw new Error("nf");

      state.custom.push({ slug:slug, lane:sel.value, len:Math.max(1, d.length||1), title:d.title||slug, custom:true });
      persist(); inp.value = "";
      renderSources();
      srcMsg("Added \u201C"+(d.title||slug)+"\u201D \u00B7 "+(d.length||0)+" blocks");
      failCount = 0;
    })["catch"](function(){ srcMsg("Couldn't find that channel \u2014 check the URL or slug."); });

  var sel = document.createElement("select"); sel.id = "srcLane";
  LANES.forEach(function(l){ if(l.id==="inbox") return; var o=document.createElement("option"); o.value=l.id; o.textContent="feeds: "+l.label; sel.appendChild(o); });
  var btn = document.createElement("button"); btn.className = "addBtn"; btn.textContent = "add channel"; btn.onclick = addCustomChannel;
  var msg = document.createElement("div"); msg.id = "srcMsg";
  box.appendChild(inp); box.appendChild(sel); box.appendChild(btn); box.appendChild(msg);
  w.appendChild(box);

  var sugg = Object.keys(state.discovered||{}).map(function(k){
    var e = state.discovered[k];
    return { slug:k, title:e.title, len:e.len, hits:e.hits, lane:e.lane };
  }).filter(function(s){ return s.hits >= 2; })
    .sort(function(a,b){ return b.hits - a.hits; }).slice(0,8);
  if(sugg.length){
    var sg = document.createElement("div"); sg.className = "laneGroup";
    var sh = document.createElement("div"); sh.className = "laneHead";
    var sh1 = document.createElement("span"); sh1.textContent = "Suggested by your keeps";
    var sh2 = document.createElement("span"); sh2.textContent = sugg.length;
    sh.appendChild(sh1); sh.appendChild(sh2); sg.appendChild(sh);
    sugg.forEach(function(s){
      var r = document.createElement("div"); r.className = "srcRow";
      var info = document.createElement("div"); info.className = "info";
      var st = document.createElement("div"); st.className = "st"; st.textContent = s.title;
      var ss = document.createElement("div"); ss.className = "ss"; ss.textContent = "held "+s.hits+" of your keeps \u00B7 "+s.len+" blocks";
      info.appendChild(st); info.appendChild(ss); r.appendChild(info);
      var no = document.createElement("button"); no.className = "ico"; no.innerHTML = "&#10005;"; no.style.color = "var(--muted)";
      no.onclick = function(){ delete state.discovered[s.slug]; persist(); renderSources(); };
      r.appendChild(no);
      var add = document.createElement("button"); add.className = "tog on"; add.textContent = "add";
      add.onclick = function(){
        state.custom = (state.custom||[]).filter(function(c){ return c.slug!==s.slug; });
        state.custom.push({ slug:s.slug, lane:s.lane||"not-design", len:Math.max(1,s.len), title:s.title, custom:true });
        delete state.discovered[s.slug];
        failCount = 0; persist(); renderSources();
      };
      r.appendChild(add);
      sg.appendChild(r);
    });
    w.appendChild(sg);
  }

  var all = DEFAULT_CHANNELS.concat(state.custom || []);
  LANES.forEach(function(l){
    var chs = all.filter(function(c){ return c.lane===l.id; });
    if(!chs.length) return;
    var grp = document.createElement("div"); grp.className = "laneGroup";
    var h = document.createElement("div"); h.className = "laneHead";
    var h1 = document.createElement("span"); h1.textContent = l.label;
    var h2 = document.createElement("span"); h2.textContent = chs.length;
    h.appendChild(h1); h.appendChild(h2); grp.appendChild(h);
    chs.forEach(function(c){
      var r = document.createElement("div"); r.className = "srcRow";
      var info = document.createElement("div"); info.className = "info";
      var st = document.createElement("div"); st.className = "st"; st.textContent = c.title;
      var ss = document.createElement("div"); ss.className = "ss"; ss.textContent = c.slug+" \u00B7 "+c.len+" blocks"+(c.custom ? " \u00B7 added by you" : "");
      info.appendChild(st); info.appendChild(ss); r.appendChild(info);
      if(c.custom){
        var del = document.createElement("button"); del.className = "ico"; del.innerHTML = "&#128465;"; del.style.color = "var(--muted)";
        del.onclick = function(){ removeCustom(c.slug); };
        r.appendChild(del);
      }
      var tog = document.createElement("button");
      var on = !state.disabled[c.slug];
      tog.className = "tog"+(on ? " on" : "");
      tog.textContent = on ? "on" : "off";
      tog.onclick = function(){ toggleSource(c.slug); };
      r.appendChild(tog);
      grp.appendChild(r);
    });
    w.appendChild(grp);
  });

  var acct = document.createElement("div"); acct.className = "addBox";
  var at = document.createElement("div"); at.className = "st"; at.textContent = "Push saves to your Are.na"; at.style.marginBottom = "6px";
  acct.appendChild(at);
  var an = document.createElement("div"); an.className = "srcNote";
  an.textContent = "Paste your personal access token from dev.are.na (stored only on this device), then map each lane to one of your channels. Push buttons then appear in the saved view.";
  acct.appendChild(an);
  var tok = document.createElement("input"); tok.type = "password"; tok.placeholder = "are.na access token";
  tok.value = arenaToken();
  tok.onchange = function(){ try{ localStorage.setItem("laveille-arena-token", tok.value.trim()); }catch(e){} };
  acct.appendChild(tok);
  LANES.forEach(function(l){
    var mi = document.createElement("input");
    mi.placeholder = l.label + " \u2192 your channel URL or slug";
    mi.value = (state.laneChannels||{})[l.id] || "";
    mi.onchange = function(){
      var vslug = mi.value.trim().split("?")[0].replace(/\/+$/,"").split("/").pop();
      if(!state.laneChannels) state.laneChannels = {};
      state.laneChannels[l.id] = vslug; mi.value = vslug; persist();
    };
    acct.appendChild(mi);
  });
  w.appendChild(acct);
}

/* ---- nav & init ---- */
function showView(v){
  view = v;
  $("deckView").style.display = v==="deck" ? "block" : "none";
  $("savedView").style.display = v==="saved" ? "block" : "none";
  $("sourcesView").style.display = v==="sources" ? "block" : "none";
  $("savedBtn").classList.toggle("active", v==="saved");
  $("srcBtn").classList.toggle("active", v==="sources");
  if(v==="saved") renderSaved();
  if(v==="sources") renderSources();
  if(v==="deck"){ renderDeck(); if(queue.length < 4 && !loading) refill(false); }
}
$("savedBtn").onclick = function(){ showView(view==="saved" ? "deck" : "saved"); };
$("srcBtn").onclick = function(){ showView(view==="sources" ? "deck" : "sources"); };
$("scanBtn").onclick = scan;
$("undoBtn").onclick = undo;
window.addEventListener("keydown", function(e){
  if(view!=="deck") return;
  if(e.key==="ArrowRight") commit(1);
  if(e.key==="ArrowLeft") commit(-1);
});

var CHIP_LANES = [
  { id:"felt-not-seen", label:"felt" },
  { id:"letterforms", label:"letters" },
  { id:"proof-of-hand", label:"hand" },
  { id:"symbiotic-design", label:"symbiotic" },
  { id:"not-design", label:"left field" },
  { id:"the-herd", label:"herd" }
];
(function(){
  var bar = $("laneBar");
  CHIP_LANES.forEach(function(l){
    var b = document.createElement("button");
    b.className = "laneChip";
    b.textContent = l.label;
    b._lane = l.id;
    b.onclick = function(){ commit(1, null, l.id); };
    bar.appendChild(b);
  });
})();

load().then(function(){ seedStarters(); renderAll(); refill(false); });
</script>
</body>
</html>
